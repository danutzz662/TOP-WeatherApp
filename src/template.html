<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <title>TOP-Weather App</title>
  </head>
  <body>
    <div class="weather-container">
      <div class="top">
        <form novalidate>
          <p>
            <label for="input">Enter the city you want to check *:</label>
            <div>
              <input type="text" name="input" id="input"  required placeholder="Enter the city here..." pattern="[a-zA-Z]+" />
              <input type="submit" value="Search"/>
            </div>
            <span class="error" aria-live="polite"></span>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
