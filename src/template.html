<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <title>TOP-Weather App</title>
  </head>
  <body>
    <div class="weather-container">
      <div class="top">
        <form novalidate>
          <label for="input">Enter the city you want to check *:</label>
          <div class="inputs">
            <input
              type="text"
              name="input"
              id="input"
              required
              placeholder="Enter the city here..."
              pattern="[a-zA-Z ]+" />
            <input type="submit" value="Search" />
          </div>
          <span class="error" aria-live="polite"></span>
        </form>
      </div>
      <div class="loader" style="display: none"></div>
      <div class="temp">
        <div class="left">
          <div class="left-top">
            <p class="pmin">
              <span class="min"></span>
              <span class="degree">°C</span>
            </p>
            <p class="pmax">
              <span class="max"></span>
              <span class="degree">°C</span>
            </p>
          </div>
          <div class="left-main">
            <span class="temp-main"></span><span class="degree">°C</span>
          </div>
        </div>
        <div class="right"></div>
      </div>
      <div class="humidity-cov">
        <div class="coverage">
          <div class="cov-title">Cloud Cover (%)</div>
          <div class="info">
            <i class="ph ph-cloud"></i>
            <div class="coverage-info"></div>
          </div>
        </div>
        <div class="humidity">
          <div class="hum-title">Relative Humidity (%)</div>
          <div class="info">
            <i class="ph ph-cloud"></i>
            <div class="humidity-info"></div>
          </div>
        </div>
      </div>
      <div class="uv-wind">
        <div class="uv">
          <div class="uv-title">UV Index (0-10)</div>
          <div class="info">
            <i class="ph ph-sun"></i>
            <div class="uv-info"></div>
          </div>
        </div>
        <div class="wind">
          <div class="wind-title">Wind Speed (km/h)</div>
          <div class="info">
            <i class="ph ph-wind"></i>
            <div class="wind-info"></div>
          </div>
        </div>
      </div>
      <div class="description"></div>
    </div>
  </body>
</html>
